<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f1c2e;
      --navy-light: #1a2d44;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --card-bg: rgba(255,255,255,0.04);
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--navy);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      background: var(--navy-light);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
    }
    .brand {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .brand span { color: var(--accent); }
    nav { display: flex; gap: 0.25rem; align-items: center; }
    nav a {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    nav a:hover, nav a.active { color: var(--text); background: var(--card-bg); }
    main { flex: 1; }
    footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header>
    <a href="{{ "/" | relURL }}" class="brand">True<span>Cost</span> · Surveys</a>
    <nav>
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <a href="https://github.com/alx/true_cost" target="_blank">TrueCost project</a>
    &nbsp;·&nbsp;
    Powered by <a href="https://formbricks.com" target="_blank">Formbricks</a>
    &nbsp;·&nbsp;
    {{ now.Format "2006" }}
  </footer>
</body>
</html>
